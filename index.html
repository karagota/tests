    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

            const correctText = opts[q.correct];
            const shuffledOpts = shuffle(opts);
            const newCorrectIdx = shuffledOpts.indexOf(correctText);
            return {
                ...q,
                options: shuffledOpts,
                correct: newCorrectIdx
            };
        });
    }

    const modeSubhead = document.getElementById('modeSubhead');
    const navBar = document.getElementById('navBar');
    const navBackMain = document.getElementById('navBackMain');
    const navInfo = document.getElementById('navInfo');
    const navPrev = document.getElementById('navPrevIncorrect');
    const navNext = document.getElementById('navNextIncorrect');

    // ----- РЕНДЕРИНГ -----
    function render() {
        container.innerHTML = '';
        if (mode === 'main') {
            modeSubhead.textContent = 'Основной тест (20 вопросов) · Порядок случайный · Выберите один вариант';
            navBar.style.display = 'none';
            currentQuestions.forEach((q, idx) => {
                const block = createQuestionBlock(q, idx, 'main');
                container.appendChild(block);
            });
        } else if (mode === 'drill') {
            // Показываем дополнительные вопросы для текущей темы
            const topic = originalQuestions.find(q => q.id === drillTopicId)?.topic || '';
            modeSubhead.textContent = `🔍 Углублённые вопросы по теме: "${topic}" · 5 вопросов`;
            navBar.style.display = 'flex';
            // Обновим навигацию
            updateNavInfo();
            drillQuestions.forEach((q, idx) => {
                const block = createQuestionBlock(q, idx, 'drill');
                container.appendChild(block);
            });
        }
    }

    function createQuestionBlock(q, idx, modeType) {
        const block = document.createElement('div');
        block.className = 'question-block';
        block.dataset.qIndex = idx;

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = q.q;
        block.appendChild(qText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        q.options.forEach((opt, optIdx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.dataset.optIndex = optIdx;

            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `q_${modeType}_${idx}`;
            radio.value = optIdx;
            radio.id = `q_${modeType}_${idx}_${optIdx}`;

            const userAns = (modeType === 'main') ? userAnswers[idx] : (drillUserAnswers[idx] ?? null);
            if (userAns === optIdx) radio.checked = true;

            const label = document.createElement('label');
            label.htmlFor = `q_${modeType}_${idx}_${optIdx}`;
            label.textContent = opt;

            optDiv.appendChild(radio);
            optDiv.appendChild(label);
            optionsDiv.appendChild(optDiv);

            radio.addEventListener('change', function() {
                if (this.checked) {
                    if (modeType === 'main') {
                        userAnswers[idx] = parseInt(this.value);
                    } else {
                        drillUserAnswers[idx] = parseInt(this.value);
                    }
                    // скрыть пояснение, если оно было показано
                    const expl = block.querySelector('.explanation');
                    if (expl) expl.classList.remove('show');
                }
            });
        });

        block.appendChild(optionsDiv);

        // Пояснение (будет показано при проверке)
        const explDiv = document.createElement('div');
        explDiv.className = 'explanation';
        explDiv.id = `expl_${modeType}_${idx}`;
        explDiv.textContent = q.explanation || '';
        block.appendChild(explDiv);

        // Ссылка на углублённые вопросы (только в основном режиме)
        if (modeType === 'main') {
            const linkDiv = document.createElement('div');
            linkDiv.className = 'drill-link';
            // Определим, правильный ли ответ, если уже проверяли
            // Но мы можем проверить, есть ли userAnswers и результат
            // Ссылку показываем всегда, но текст разный
            const link = document.createElement('a');
            link.textContent = '📚 Хочу углубиться в эту тему';
            link.style.cursor = 'pointer';
            link.addEventListener('click', function(e) {
                e.preventDefault();
                switchToDrill(q.id);
            });
            linkDiv.appendChild(link);
            block.appendChild(linkDiv);
        }

        return block;
    }

    // ----- ПЕРЕКЛЮЧЕНИЕ В РЕЖИМ DRILL -----
    function switchToDrill(topicId) {
        mode = 'drill';
        drillTopicId = topicId;
        // Получить дополнительные вопросы для этой темы
        drillQuestions = shuffle(drillData[topicId] || []);
        // Если нет вопросов, создадим заглушку
        if (drillQuestions.length === 0) {
            drillQuestions = [
                { q: 'Нет дополнительных вопросов по этой теме.', options: ['ОК'], correct: 0, explanation: '' }
            ];
        }
        drillUserAnswers = new Array(drillQuestions.length).fill(null);
        // Сбросить результат
        resultBox.classList.remove('show');
        render();
    }

    function switchToMain() {
        mode = 'main';
        navBar.style.display = 'none';
        resultBox.classList.remove('show');
        render();
    }

    // ----- НАВИГАЦИЯ ПО НЕПРАВИЛЬНЫМ -----
    function updateNavInfo() {
        if (incorrectIds.length === 0) {
            navInfo.textContent = '✅ Все вопросы отвечены правильно!';
            navPrev.disabled = true;
            navNext.disabled = true;
            return;
        }
        const total = incorrectIds.length;
        const idx = currentIncorrectIndex;
        const topic = originalQuestions.find(q => q.id === incorrectIds[idx])?.topic || '';
        navInfo.textContent = `Неправильный вопрос ${idx+1} из ${total} (тема: ${topic})`;
        navPrev.disabled = (idx === 0);
        navNext.disabled = (idx === total - 1);
    }

    function goToPrevIncorrect() {
        if (incorrectIds.length === 0) return;
        currentIncorrectIndex = (currentIncorrectIndex - 1 + incorrectIds.length) % incorrectIds.length;
        switchToDrill(incorrectIds[currentIncorrectIndex]);
    }

    function goToNextIncorrect() {
        if (incorrectIds.length === 0) return;
        currentIncorrectIndex = (currentIncorrectIndex + 1) % incorrectIds.length;
        switchToDrill(incorrectIds[currentIncorrectIndex]);
    }

    // ----- ПРОВЕРКА ОСНОВНОГО ТЕСТА -----
    function checkMainTest() {
        let correctCount = 0;
        const blocks = document.querySelectorAll('.question-block');
        // Сбросим подсветку и пояснения
        blocks.forEach(block => {
            block.classList.remove('highlight-correct');
            const expl = block.querySelector('.explanation');
            if (expl) expl.classList.remove('show');
        });

        // Собираем неправильные id
        const incorrectIdsTemp = [];

        blocks.forEach((block, idx) => {
            const q = currentQuestions[idx];
            const userIdx = userAnswers[idx];
            const correctIdx = q.correct;
            const expl = block.querySelector('.explanation');
            const options = block.querySelectorAll('.option');

            options.forEach((opt, optIdx) => {
                opt.classList.remove('correct', 'wrong');
                const mark = opt.querySelector('.correct-mark, .wrong-mark');
                if (mark) mark.remove();

                if (optIdx === correctIdx) {
                    opt.classList.add('correct');
                    const span = document.createElement('span');
                    span.className = 'correct-mark';
                    span.textContent = ' ✓';
                    opt.appendChild(span);
                } else if (optIdx === userIdx && userIdx !== correctIdx) {
                    opt.classList.add('wrong');
                    const span = document.createElement('span');
                    span.className = 'wrong-mark';
                    span.textContent = ' ✗';
                    opt.appendChild(span);
                }
            });

            if (userIdx === correctIdx) {
                correctCount++;
            } else {
                // Неправильный ответ – запоминаем id
                incorrectIdsTemp.push(q.id);
                if (expl) expl.classList.add('show');
            }

            block.classList.add('highlight-correct');
        });

        // Обновляем глобальный список неправильных
        incorrectIds = incorrectIdsTemp;
        currentIncorrectIndex = 0;

        // Результат
        resultText.textContent = `Правильных ответов: ${correctCount} из ${currentQuestions.length}`;
        resultBox.classList.add('show');

        // Обновим ссылки на углубление: для правильных – другой текст
        const allLinks = document.querySelectorAll('.drill-link a');
        allLinks.forEach((link, index) => {
            // Определяем, какой это вопрос (по индексу)
            const block = link.closest('.question-block');
            const idx = Array.from(block.parentNode.children).indexOf(block);
            const q = currentQuestions[idx];
            const userIdx = userAnswers[idx];
            if (userIdx === q.correct) {
                link.textContent = '📚 Хочу углубиться в эту тему (вы ответили верно)';
            } else {
                link.textContent = '📚 Пройти дополнительные вопросы по этой теме (вы ошиблись)';
            }
        });
    }

    // ----- ОБРАБОТЧИКИ -----
    checkBtn.addEventListener('click', function() {
        if (mode === 'main') {
            checkMainTest();
        } else {
            // Проверка drill-вопросов
            let correctCount = 0;
            const blocks = document.querySelectorAll('.question-block');
            blocks.forEach((block, idx) => {
                const q = drillQuestions[idx];
                const userIdx = drillUserAnswers[idx];
                const correctIdx = q.correct;
                const expl = block.querySelector('.explanation');
                const options = block.querySelectorAll('.option');

                options.forEach((opt, optIdx) => {
                    opt.classList.remove('correct', 'wrong');
                    const mark = opt.querySelector('.correct-mark, .wrong-mark');
                    if (mark) mark.remove();

                    if (optIdx === correctIdx) {
                        opt.classList.add('correct');
                        const span = document.createElement('span');
                        span.className = 'correct-mark';
                        span.textContent = ' ✓';
                        opt.appendChild(span);
                    } else if (optIdx === userIdx && userIdx !== correctIdx) {
                        opt.classList.add('wrong');
                        const span = document.createElement('span');
                        span.className = 'wrong-mark';
                        span.textContent = ' ✗';
                        opt.appendChild(span);
                    }
                });

                if (userIdx === correctIdx) {
                    correctCount++;
                    if (expl) expl.classList.remove('show');
                } else {
                    if (expl) expl.classList.add('show');
                }
                block.classList.add('highlight-correct');
            });
            resultText.textContent = `Правильных ответов по углублённым вопросам: ${correctCount} из ${drillQuestions.length}`;
            resultBox.classList.add('show');
        }
    });

    resetBtn.addEventListener('click', function() {
        // Сброс всего
        if (mode === 'drill') {
            switchToMain();
        } else {
            currentQuestions = shuffleQuestions(originalQuestions);
            userAnswers = new Array(currentQuestions.length).fill(null);
            incorrectIds = [];
            currentIncorrectIndex = 0;
            resultBox.classList.remove('show');
            render();
        }
    });

    navBackMain.addEventListener('click', switchToMain);
    navPrev.addEventListener('click', goToPrevIncorrect);
    navNext.addEventListener('click', goToNextIncorrect);

    // ----- ИНИЦИАЛИЗАЦИЯ -----
    render();
</script>
</body>
</html>
